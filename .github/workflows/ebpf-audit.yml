name: eBPF Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.go"
      - "**/*.c"
      - "**/*.h"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "scripts/ebpf-audit.sh"
      - ".github/workflows/ebpf-audit.yml"

permissions: read-all

jobs:
  ebpf_audit:
    name: Load, Verifier, and Dump Audit
    runs-on: ubuntu-22.04
    env:
      GOEXPERIMENT: heapminimum512kib,randomizedheapbase64

    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-generic

      - name: Run eBPF audit
        run: |
          export CLANG=clang
          export LLVM_OBJDUMP=llvm-objdump
          ./scripts/ebpf-audit.sh build/ebpf-audit

      - name: Upload eBPF audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ebpf-audit
          path: build/ebpf-audit
