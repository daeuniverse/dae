name: Build (Main)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - kdae
    paths:
      - "**/*.go"
      - "**/*.c"
      - "**/*.h"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"
      - ".github/workflows/seed-build.yml"
      - "scripts/**"
      - "Makefile"

jobs:
  pre-actions:
    uses: daeuniverse/ci-seed-jobs/.github/workflows/pre-actions.yml@master
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
      fetch-depth: 0
      check-runs: '["build", "main-build-passed"]'
    secrets: inherit

  build:
    # uses: daeuniverse/dae/.github/workflows/seed-build.yml@main
    uses: ./.github/workflows/seed-build.yml
    with:
      ref: ${{ github.sha }}
      build-type: main-build
    secrets: inherit

  post-actions:
    if: always()
    needs: [build]
    uses: daeuniverse/ci-seed-jobs/.github/workflows/dae-post-actions.yml@master
    with:
      check-run-id: "dae-bot[bot]/main-build-passed"
      check-run-conclusion: ${{ needs.build.result }}
    secrets: inherit

  update-release:
    if: needs.build.result == 'success'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dae-linux-x86_64.zip
          path: /tmp/dae_artifact/

      - name: Verify dae binary (auto-extracted by download-artifact)
        run: |
          ls -lh /tmp/dae_artifact/dae-linux-x86_64
          chmod +x /tmp/dae_artifact/dae-linux-x86_64

      - name: Update GitHub Release (delete old + upload new + update body)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 scripts/update-release.py "338955206" "/tmp/dae_artifact/dae-linux-x86_64"
